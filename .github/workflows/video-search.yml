name: Video Search

# Decoupled from the catalog refresh: YouTube/Vimeo discovery is quota-limited and slow,
# so it runs on its own cadence and only touches demos.json + the search state.
#   daily   — scripts whose repo changed since last look (a new commit may mean a new demo)
#   weekly  — scripts still without a demo (budget-capped; backlog drains over weeks)
#   monthly — re-verify existing demos are still public + a broad re-search
on:
  schedule:
    - cron: '0 6 * * *'    # daily   06:00 UTC
    - cron: '0 7 * * 1'    # weekly  Monday 07:00 UTC
    - cron: '0 8 1 * *'    # monthly 1st 08:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'daily | weekly | monthly'
        default: 'daily'

permissions:
  contents: write

concurrency:
  group: video-search
  cancel-in-progress: false

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pick mode from the schedule
        id: mode
        env:
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          # Untrusted inputs go through env vars; FLAG is chosen from a fixed whitelist
          # (never built from the raw input), so a hand-set mode can't inject a command.
          case "$SCHEDULE" in
            "0 7 * * 1") FLAG="--weekly" ;;
            "0 8 1 * *") FLAG="--monthly" ;;
            *)
              case "$INPUT_MODE" in
                weekly)  FLAG="--weekly" ;;
                monthly) FLAG="--monthly" ;;
                *)       FLAG="--daily" ;;
              esac ;;
          esac
          echo "flag=$FLAG" >> "$GITHUB_OUTPUT"

      - name: Search for demos
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          VIMEO_TOKEN: ${{ secrets.VIMEO_TOKEN }}
        run: python video_search.py "${{ steps.mode.outputs.flag }}"

      - name: Commit demo updates
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add demos.json video_search_state.json
          if git diff --staged --quiet; then
            echo "no demo updates; nothing to commit"
            exit 0
          fi
          # demos.json / video_search_state.json are generated state: the run that just
          # finished holds the freshest version, so replay it onto the latest main rather
          # than three-way merging. reset --soft (never rebase) keeps us off a detached
          # HEAD; retry to absorb a concurrent catalog-refresh push.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --soft origin/main
            git add demos.json video_search_state.json
            if git diff --staged --quiet; then
              echo "demo state already current on origin/main"
              exit 0
            fi
            git commit -m "demos: refresh ($(date -u +%F))"
            if git push origin HEAD:main; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected (attempt $attempt); refetching and retrying"
            sleep $((RANDOM % 8 + 3))
          done
          echo "::error::could not push demo updates after 5 attempts"
          exit 1
