name: Deploy Pages site

# Publishes the static catalog browser at https://seajaysec.github.io/nornslist/
# On every push to main that touches the site or the scrape artifacts, it
# regenerates docs/data.json from the latest committed xlsx + feed.json, then
# deploys docs/ to GitHub Pages. This means each nightly scrape (which commits
# the xlsx + feed.json) automatically republishes a fresh site with zero extra
# wiring — the daily-scrape workflow's push is what triggers this one.
#
# One-time setup (repo owner): Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'feed.json'
      - 'norns_scripts_discourse.xlsx'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow a nightly-scrape-triggered run and a manual run to coexist; newest wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install openpyxl
        run: python -m pip install --upgrade pip openpyxl

      - name: Regenerate data.json from latest scrape
        run: python docs/build_data.py

      - name: Stage site
        run: |
          mkdir -p _site
          cp -R docs/. _site/
          # build_data.py is a build tool, not a served asset
          rm -f _site/build_data.py

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
