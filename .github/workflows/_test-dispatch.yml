name: _test churn dispatch (temporary)
on:
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: dispatch with GH_PAT
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/seajaysec/nornslist-churn/dispatches \
            -d '{"event_type":"catalog-refreshed"}')
          echo "dispatch HTTP $code"
          test "$code" = "204"
