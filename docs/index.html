<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>nornslist · norns scripts</title>
<meta name="description" content="A browsable, searchable catalog of every norns script — from norns.community, GitHub, and the lines forum — with tags, demos, READMEs, screenshots, authors and last-updated, refreshed nightly." />
<meta name="theme-color" content="#1D1F21" />
<meta property="og:title" content="nornslist · norns scripts" />
<meta property="og:description" content="Browse every norns script — searchable, filterable, with demos, READMEs and screenshots." />

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231D1F21'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='%23DEB887' font-family='monospace'%3E%E2%97%88%3C/text%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#1D1F21; --panel:#25282C; --panel2:#1F2123; --trim:#333;
    --fg:#C5C8C6; --muted:#969896; --faint:#5a5f63;
    --accent:#DEB887; --accent2:#CC9999; --ok:#8aa872; --err:#c06a45;
    --radius:13px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.45;
  }
  a{color:var(--accent2); text-decoration:none}
  a:hover{text-decoration:underline}
  ::selection{background:color-mix(in srgb,var(--accent) 40%,transparent)}

  /* ---- top bar ---- */
  header.top{
    position:sticky; top:0; z-index:30;
    background:color-mix(in srgb,var(--bg) 86%,transparent);
    backdrop-filter:saturate(140%) blur(12px);
    -webkit-backdrop-filter:saturate(140%) blur(12px);
    border-bottom:1px solid var(--trim);
  }
  .top-inner{max-width:1280px; margin:0 auto; padding:14px 18px 12px}
  .brand{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap}
  .brand h1{
    margin:0; font-size:23px; font-weight:800; letter-spacing:-.4px;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    background:linear-gradient(95deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand .sub{color:var(--muted); font-size:13px}
  .brand .sub b{color:var(--fg); font-weight:600}
  .brand .spacer{flex:1}
  .ghlink{font-size:12.5px; color:var(--muted); display:inline-flex; align-items:center; gap:6px}
  .ghlink:hover{color:var(--accent); text-decoration:none}

  /* ---- controls ---- */
  .controls{display:flex; gap:10px; align-items:center; margin-top:12px; flex-wrap:wrap}
  .search{
    flex:1; min-width:220px; position:relative; display:flex; align-items:center;
  }
  .search svg{position:absolute; left:11px; width:15px; height:15px; color:var(--faint); pointer-events:none}
  .search input{
    width:100%; background:var(--panel2); border:1px solid var(--trim);
    color:var(--fg); border-radius:10px; padding:9px 32px 9px 33px; font-size:14px;
    outline:none; transition:border-color .15s;
  }
  .search input:focus{border-color:var(--accent2)}
  .search .clr{
    position:absolute; right:8px; width:20px; height:20px; border:0; background:transparent;
    color:var(--faint); cursor:pointer; font-size:16px; line-height:1; display:none;
  }
  .search.has .clr{display:block}
  select.sort{
    background:var(--panel2); color:var(--fg); border:1px solid var(--trim);
    border-radius:10px; padding:9px 10px; font-size:13px; cursor:pointer; outline:none;
  }
  select.sort:focus{border-color:var(--accent2)}

  /* ---- filter dropdowns ---- */
  .ctrls{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .dd{position:relative; display:inline-block}
  .dd-btn{
    appearance:none; border:1px solid var(--trim); background:var(--panel2); color:var(--fg);
    font:inherit; font-size:13px; padding:9px 27px 9px 13px; border-radius:10px; cursor:pointer;
    white-space:nowrap; display:inline-block; text-align:left;
    background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 14px) 50%,calc(100% - 9px) 50%; background-size:5px 5px,5px 5px; background-repeat:no-repeat;
  }
  .dd-btn:hover{border-color:var(--muted)}
  .dd-btn.on{border-color:var(--accent2); color:var(--accent2)}
  .dd-pop{
    position:absolute; z-index:40; top:calc(100% + 5px); left:0; min-width:205px; max-height:340px; overflow:auto;
    background:var(--panel); border:1px solid var(--trim); border-radius:11px; padding:5px; display:none;
    box-shadow:0 14px 36px rgba(0,0,0,.5);
  }
  .dd.open .dd-pop{display:block}
  .dd-opt{display:flex; align-items:center; gap:9px; padding:7px 10px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--fg); white-space:nowrap}
  .dd-opt:hover{background:color-mix(in srgb,var(--fg) 8%,transparent)}
  .dd-opt input{accent-color:var(--accent2); width:15px; height:15px; flex:0 0 auto; margin:0}
  .dd-opt .ct{margin-left:auto; font-size:11px; color:var(--muted); padding-left:16px}
  .dd-sep{height:1px; background:var(--trim); margin:5px 6px}

  @media (max-width:600px){
    .controls{gap:8px}
    .search{flex-basis:100%; order:-1; min-width:0}
  }

  /* ---- active filters ---- */
  .active{display:flex; gap:8px; flex-wrap:wrap; align-items:center; min-height:0}
  .active:empty{display:none}
  .active .ftag{
    display:inline-flex; align-items:center; gap:6px; font-size:12px;
    background:color-mix(in srgb,var(--accent2) 18%,transparent); color:var(--accent2);
    border:1px solid color-mix(in srgb,var(--accent2) 40%,transparent); border-radius:20px; padding:3px 6px 3px 11px;
  }
  .active .ftag button{border:0; background:transparent; color:inherit; cursor:pointer; font-size:14px; line-height:1; padding:0 2px}
  .active .clearall{font-size:12px; color:var(--muted); background:none; border:0; cursor:pointer; text-decoration:underline}

  /* ---- result meta ---- */
  .resmeta{max-width:1280px; margin:14px auto 2px; padding:0 18px; color:var(--muted); font-size:12.5px}
  .resmeta b{color:var(--fg)}

  /* ---- grid ---- */
  main{max-width:1280px; margin:0 auto; padding:8px 18px 60px}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:13px}
  .card{
    background:var(--panel); border:1px solid var(--trim); border-radius:var(--radius);
    padding:14px 15px; display:flex; flex-direction:column; gap:9px;
    transition:border-color .15s, transform .15s, box-shadow .15s; scroll-margin-top:96px;
  }
  .card:hover{border-color:var(--accent2); box-shadow:0 4px 18px rgba(0,0,0,.18)}
  .card .head{display:flex; gap:10px; align-items:flex-start}
  .card .id{flex:1; min-width:0}
  .card .nm{
    font-size:15.5px; font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    font-weight:700; color:var(--fg); word-break:break-word; display:flex; align-items:center; gap:7px; flex-wrap:wrap;
  }
  .badge{
    font-size:10px; font-weight:700; letter-spacing:.3px; text-transform:uppercase;
    border-radius:5px; padding:1.5px 6px; line-height:1.5;
  }
  .badge.eng{color:#241a0d; background:var(--accent)}
  .badge.arch{color:#caa46a; background:color-mix(in srgb,#caa46a 15%,transparent)}
  .badge.del{color:var(--err); background:color-mix(in srgb,var(--err) 15%,transparent)}
  /* type / nb / source facet chips — ingenue-parity portrayal of the structural
     kind (script/mod/library/engine) the catalog already carries in `kind`. */
  .facets{display:flex; flex-wrap:wrap; gap:5px; margin:-1px 0 0}
  .facet{
    font-size:10.5px; line-height:1.6; padding:1px 8px; border-radius:9px; white-space:nowrap;
    border:1px solid color-mix(in srgb,var(--fc) 45%,transparent);
    background:color-mix(in srgb,var(--fc) 14%,transparent); color:var(--fc);
  }
  .srctag{font-size:10.5px; font-weight:600; line-height:1.6; padding:1px 8px; border-radius:9px; white-space:nowrap}
  .srctag.gh{
    color:#7ee787; background:color-mix(in srgb,#7ee787 14%,transparent);
    border:1px solid color-mix(in srgb,#7ee787 42%,transparent);
  }
  /* github-discovered repos get a left-edge accent (ingenue's .card.gh) */
  .card.gh{border-left:3px solid color-mix(in srgb,#7ee787 60%,transparent)}
  .foot .stars{color:var(--faint)}
  .card .by{font-size:12.5px; color:var(--muted); margin-top:2px}
  .card .by a{color:var(--muted)}
  .card .by a:hover{color:var(--accent2)}
  .card .desc{
    font-size:13.5px; color:var(--fg); line-height:1.45; margin:0;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card.open .desc{-webkit-line-clamp:unset}
  .pills{display:flex; gap:6px; flex-wrap:wrap}
  .pill{
    font-size:11.5px; background:color-mix(in srgb,var(--accent) 16%,transparent);
    color:var(--accent); border-radius:20px; padding:2px 9px; cursor:pointer; border:1px solid transparent; transition:all .12s;
  }
  .pill:hover{border-color:var(--accent)}
  .pill.on{background:color-mix(in srgb,var(--accent2) 26%,transparent); color:var(--accent2)}
  .card .foot{display:flex; align-items:center; gap:8px; margin-top:1px; flex-wrap:wrap}
  .card .foot .upd{font-size:11.5px; color:var(--faint); margin-right:auto}
  .lnk{
    display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px;
    border-radius:7px; color:var(--muted); border:1px solid var(--trim); transition:all .14s;
  }
  .lnk:hover{color:var(--accent); border-color:var(--accent2); text-decoration:none}
  .lnk svg{width:15px; height:15px}
  .lnk.demo{color:var(--accent2)}
  .lnk.copy-install{cursor:pointer; background:transparent}
  .lnk.copy-install:hover{color:var(--accent); border-color:var(--accent)}
  .lnk.copied{color:var(--ok); border-color:var(--ok)}

  /* ---- inline rich body (open by default, ingenue-parity) ---- */
  .more{display:flex; margin-top:2px; padding-top:10px; border-top:1px solid var(--trim); flex-direction:column; gap:7px}
  /* source-provenance line + a quiet correction link pushed to the right */
  .prov{font-size:11.5px; color:var(--faint); display:flex; gap:8px; align-items:baseline}
  .prov b{color:var(--muted); font-weight:600}
  .prov .correct{margin-left:auto; color:var(--faint); white-space:nowrap}
  .prov .correct:hover{color:var(--accent2)}
  /* lazy load-on-tap affordances: demo / screenshots / readme */
  .aff{
    align-self:flex-start; appearance:none; border:1px solid color-mix(in srgb,var(--accent2) 55%,transparent);
    background:transparent; color:var(--accent2); border-radius:8px; padding:6px 12px; font-size:12.5px;
    font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:7px; text-align:left;
  }
  .aff:hover{background:color-mix(in srgb,var(--accent2) 14%,transparent); text-decoration:none}
  .aff svg{width:14px; height:14px}
  .aff .n{color:var(--faint); font-weight:500}
  .nodemo{font-size:11.5px; color:var(--faint); align-self:flex-start}
  .carousel{position:relative; border-radius:9px; overflow:hidden; background:var(--panel2); border:1px solid var(--trim)}
  .carousel .frame{aspect-ratio:16/10; display:flex; align-items:center; justify-content:center; overflow:hidden}
  .carousel img{width:100%; height:100%; object-fit:contain; background:#111}
  .carousel .nav{
    position:absolute; top:50%; transform:translateY(-50%); width:30px; height:30px; border-radius:50%;
    border:0; background:rgba(0,0,0,.55); color:#fff; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center;
  }
  .carousel .nav:hover{background:rgba(0,0,0,.8)}
  .carousel .prev{left:8px} .carousel .next{right:8px}
  .carousel .dots{position:absolute; bottom:7px; left:0; right:0; display:flex; gap:5px; justify-content:center}
  .carousel .dots i{width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.35)}
  .carousel .dots i.on{background:var(--accent)}
  .carousel .count{position:absolute; top:7px; right:9px; font-size:11px; color:#ddd; background:rgba(0,0,0,.5); padding:1px 7px; border-radius:10px}
  .demoembed{border-radius:9px; overflow:hidden; border:1px solid var(--trim); background:#000}
  .demoembed iframe{display:block; width:100%; border:0}
  .readme{
    font-size:12.5px; color:var(--muted); line-height:1.55; white-space:pre-wrap; word-break:break-word;
    max-height:280px; overflow:auto; background:var(--panel2); border:1px solid var(--trim); border-radius:9px; padding:11px 12px;
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  .readme.full{max-height:none}
  .readme-toggle{font-size:11.5px; color:var(--accent2); background:none; border:0; cursor:pointer; align-self:flex-start; padding:0}

  /* ---- states ---- */
  .empty,.loading{text-align:center; padding:80px 20px; color:var(--muted)}
  .empty h3{color:var(--fg); margin:0 0 6px; font-weight:600}
  .spinner{width:30px; height:30px; border:3px solid var(--trim); border-top-color:var(--accent); border-radius:50%; margin:0 auto 16px; animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .skel{display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:13px}
  .skel .c{height:148px; border-radius:var(--radius); background:linear-gradient(100deg,var(--panel) 30%,var(--panel2) 50%,var(--panel) 70%); background-size:200% 100%; animation:sh 1.3s infinite}
  @keyframes sh{to{background-position:-200% 0}}

  footer{max-width:1280px; margin:0 auto; padding:24px 18px 50px; color:var(--faint); font-size:12px; border-top:1px solid var(--trim); display:flex; gap:8px; flex-wrap:wrap; align-items:center}
  footer .spacer{flex:1}

  @media (max-width:640px){
    .grid,.skel{grid-template-columns:1fr}
    .brand h1{font-size:20px}
    .brand .ghlink{display:none}
    .top-inner{padding:12px 14px}
    .resmeta,main,footer{padding-left:14px; padding-right:14px}
    /* search takes the first row full-width; dropdowns + sort wrap below it */
    .controls{flex-wrap:wrap}
    .search{min-width:100%; order:-1}
    select.sort{flex:1}
    /* on phones the bar sits at the top of the page and scrolls away naturally
       (scroll back to the top to get it) — no sticky/hide-on-scroll dance */
    header.top{position:static}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important; scroll-behavior:auto}
  }
</style>
</head>

  <div class="top-inner">

<script>
(() => {
  "use strict";
  const $ = (s, r=document) => r.querySelector(s);
  const esc = (s) => (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  // Filter state: src/type/feat/tags are multiselect Sets. Source defaults to the
  // curated norns.community front door; reveal soft-launch / gh-exclusive via the
  // Source dropdown. type/feat/tags empty = no filter.
  const state = { all:[], src:new Set(["community"]), type:new Set(), feat:new Set(["installable"]), tags:new Set(), q:"", sort:"updated:desc", only:"" };
  // The three source categories (mirrors ingenue): community, soft launch (on
  // github + a lines thread), gh-exclusive (github only).
  const CATS=[["community","norns.community"],["softlaunch","soft launch"],["ghx","gh exclusive"]];
  const TYPES=["script","mod","library","engine"];
  const FEATS=[["installable","✓ installable"],["voices","♪ additional voice"],["demo","▶ demo"],["images","▣ screenshots"],["readme","≣ readme"],["engine","⚙ engine"],["doc","📖 docs"]];
  const catOf=(s)=> (s.source||"community")==="community" ? "community" : ((s.disc||"").trim() ? "softlaunch" : "ghx");

  /* ---------- demo embed detection ---------- */
  function demoEmbed(url){
    if(!url) return null;
    let m;
    if((m = url.match(/(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{6,})/)))
      return {type:"youtube", src:`https://www.youtube-nocookie.com/embed/${m[1]}`, ratio:"16/9"};
    if((m = url.match(/vimeo\.com\/(?:video\/)?(\d+)/)))
      return {type:"vimeo", src:`https://player.vimeo.com/video/${m[1]}`, ratio:"16/9"};
    if(/soundcloud\.com\//.test(url) && !/\/sets\//.test(url) || /soundcloud\.com\/.+\/sets\//.test(url))
      return {type:"soundcloud", src:`https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%23DEB887&visual=false`, ratio:"audio"};
    if(/bandcamp\.com\//.test(url)) return {type:"bandcamp", ext:true};
    if(/instagram\.com\//.test(url)) return {type:"instagram", ext:true};
    return {type:"link", ext:true};
  }

  /* ---------- icons ---------- */
  const ICON = {
    proj:'<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.7-.01-1.37-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>',
    disc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
    doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
    comm:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
    demo:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
    install:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>',
    check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>'
  };

  /* ---------- card render ---------- */
  function linkIcon(href, kind, title){
    if(!href) return "";
    return `<a class="lnk ${kind==='demo'?'demo':''}" href="${esc(href)}" target="_blank" rel="noopener" title="${esc(title)}">${ICON[kind]}</a>`;
  }

  // structural-kind chips (ingenue FACET_META palette): icon, label, color
  const FACET_META = {
    script:  ['▶','script','#7ee787'],
    mod:     ['◆','mod','#c678dd'],
    library: ['❏','library','#56b6c2'],
    engine:  ['♪','engine','#e5c07b'],
  };
  function facetsHTML(s){
    // engine kind chip only when no named engine was extracted (the named badge
    // on the title line already conveys engine-ness, and richer); avoids double-up.
    const chips = (s.kind||[]).filter(k => k!=="engine" || !s.engine).map(k => {
      const m = FACET_META[k]; if(!m) return "";
      return `<span class="facet" style="--fc:${m[2]}">${m[0]} ${esc(m[1])}</span>`;
    });
    if(s.voices){
      const pr = s.voices.provides||[], us = s.voices.uses||[];
      if(pr.includes("nb"))
        chips.push(`<span class="facet" style="--fc:var(--accent2)" title="registers nb (note-bridge) voice(s) other scripts can play">♪ nb voices</span>`);
      else if(us.includes("nb"))
        chips.push(`<span class="facet" style="--fc:var(--accent2)" title="plays through nb — needs an nb voice installed to make sound">♪ nb-ready</span>`);
      (s.voices.systems||[]).filter(x => x!=="nb").forEach(x =>
        chips.push(`<span class="facet" style="--fc:var(--accent2)" title="voice system: ${esc(x)}">♪ ${esc(x)}</span>`));
    }
    // provenance chip — github only; community is the implied default front door
    if(s.source==="github") chips.push('<span class="srctag gh" title="found on GitHub — not on norns.community">github</span>');
    return chips.length ? `<div class="facets">${chips.join("")}</div>` : "";
  }

  function cardHTML(s){
    const tags = (s.tags||[]).map(t =>
      `<span class="pill${state.tags.has(t.toLowerCase())?' on':''}" data-tag="${esc(t.toLowerCase())}">${esc(t)}</span>`).join("");
    const badges = (s.engine?`<span class="badge eng" title="ships SuperCollider engine ${esc(s.engine)}">${esc(s.engine)}</span>`:"")
                 + (s.status==="archived"?'<span class="badge arch" title="repository archived by its owner — still installable, no longer maintained">archived</span>':"")
                 + (s.status==="delisted"?'<span class="badge del" title="removed from norns.community since it was last cataloged">delisted</span>':"")
                 + (s.status==="missing"?'<span class="badge del" title="repository no longer exists on GitHub">unavailable</span>':"");
    const install = s.proj
      ? `<button class="lnk copy-install" data-install="${esc(s.proj)}" title="copy maiden install command — ;install ${esc(s.proj)}">${ICON.install}</button>`
      : "";
    const links = install
                + linkIcon(s.proj,'proj','project / source')
                + linkIcon(s.disc,'disc','discussion thread')
                + linkIcon(s.doc,'doc','documentation')
                + linkIcon(s.comm,'comm','norns.community page')
                + linkIcon(s.demo,'demo','demo');
    // inline rich body (open by default): provenance line + lazy load-on-tap
    // affordances for the demo / screenshots / readme we already scraped.
    const aff = [];
    if(s.demo){
      const e = demoEmbed(s.demo);
      if(e && !e.ext){
        const h = e.ratio==="audio" ? 'height:120px' : 'aspect-ratio:'+e.ratio;
        aff.push(`<button class="aff" data-embed="${esc(e.src)}" data-style="${h}">${ICON.demo} load ${esc(e.type)} demo</button>`);
      } else {
        aff.push(`<a class="aff" href="${esc(s.demo)}" target="_blank" rel="noopener">${ICON.demo} watch demo ↗</a>`);
      }
    }
    if(s.images && s.images.length)
      aff.push(`<button class="aff" data-shots="1">▣ screenshots <span class="n">${s.images.length}</span></button>`);
    if(s.readme)
      aff.push(`<button class="aff" data-readme="1">📖 load README</button>`);
    return `<article class="card${s.source==="github"?" gh":""}" data-name="${esc(s.name.toLowerCase())}" data-slug="${esc(s.slug||'')}">
      <div class="head"><div class="id">
        <div class="nm">${esc(s.name)}${badges}</div>
        <div class="by">by <a href="${esc(s.proj||'#')}" target="_blank" rel="noopener">${esc(s.author||'unknown')}</a></div>
      </div></div>
      ${s.desc?`<p class="desc">${esc(s.desc)}</p>`:""}
      ${facetsHTML(s)}
      ${tags?`<div class="pills">${tags}</div>`:""}
      <div class="foot">
        <span class="upd">${s.upd?'updated '+esc(s.upd):''}${s.source==="github"&&s.stars?' · ★ '+s.stars:''}</span>
        ${links}
      </div>
      <div class="more">
        <div class="prov">via <b>${esc(srcLabel(s))}</b><a class="correct" href="${correctionURL(s)}" target="_blank" rel="noopener">report a correction ↗</a></div>
        ${aff.join("")}
      </div>
    </article>`;
  }

  /* ---------- source label + correction link ---------- */
  function srcLabel(s){
    const c = catOf(s);
    return c==="community" ? "norns.community" : c==="softlaunch" ? "soft launch · lines" : "GitHub";
  }
  function correctionURL(s){
    return "https://github.com/seajaysec/nornslist/issues/new?title="
      + encodeURIComponent("correction: " + s.name)
      + "&body=" + encodeURIComponent("Script: " + s.name + "\nPage: " + location.origin + location.pathname + "#s=" + (s.slug||"") + "\n\nWhat's wrong / what should it be:\n");
  }

  /* ---------- lazy content loaders (replace the affordance buttons on tap) ---------- */
  function loadShots(btn, s){
    const wrap = document.createElement("div");
    wrap.className = "carousel"; wrap.dataset.i = "0";
    wrap.innerHTML = `<div class="frame"><img src="${esc(s.images[0])}" alt="${esc(s.name)} screenshot" loading="lazy" onerror="this.closest('.carousel').dataset.broken=(+(this.closest('.carousel').dataset.broken||0)+1)"></div>`
      + (s.images.length>1?`<button class="nav prev" aria-label="previous">‹</button><button class="nav next" aria-label="next">›</button>
        <span class="count">1 / ${s.images.length}</span>
        <div class="dots">${s.images.map((_,i)=>`<i class="${i===0?'on':''}"></i>`).join("")}</div>`:"");
    btn.replaceWith(wrap);
  }
  function loadReadme(btn, s){
    const div = document.createElement("div");
    div.className = "readme"; div.textContent = s.readme;   // textContent: no manual escaping
    btn.replaceWith(div);
    if(s.readme.length>600){
      const tog = document.createElement("button");
      tog.className = "readme-toggle"; tog.textContent = "show full readme ▾";
      div.after(tog);
    }
  }
  function loadDemo(btn){
    const wrap = document.createElement("div");
    wrap.className = "demoembed";
    wrap.innerHTML = `<iframe src="${btn.dataset.embed}" style="${btn.dataset.style}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen loading="lazy"></iframe>`;
    btn.replaceWith(wrap);
  }
  // single-script permalink view: eagerly load everything for the one card
  function expandAll(card, s){
    card.querySelectorAll(".aff[data-embed]").forEach(loadDemo);
    card.querySelectorAll(".aff[data-shots]").forEach(b => loadShots(b, s));
    card.querySelectorAll(".aff[data-readme]").forEach(b => loadReadme(b, s));
  }

  /* ---------- carousel + interactions (event-delegated) ---------- */
  function wireCard(card, s){
    card.addEventListener("click", (ev) => {
      const t = ev.target;
      if(t.closest("a")) return; // let links work
      const cp = t.closest(".copy-install");
      if(cp){ copyInstall(cp); return; }
      const pill = t.closest(".pill");
      if(pill){ toggleTag(pill.dataset.tag); return; }
      const nav = t.closest(".nav");
      if(nav){ moveCarousel(nav.closest(".carousel"), s, nav.classList.contains("next")?1:-1); return; }
      const aff = t.closest(".aff");
      if(aff){
        if(aff.dataset.embed) loadDemo(aff);
        else if(aff.dataset.shots) loadShots(aff, s);
        else if(aff.dataset.readme) loadReadme(aff, s);
        return;
      }
      const rt = t.closest(".readme-toggle");
      if(rt){
        const rd = rt.previousElementSibling;
        const full = rd.classList.toggle("full");
        rt.textContent = full ? "show less ▴" : "show full readme ▾";
        return;
      }
    });
  }
  function copyInstall(btn){
    const cmd = ";install " + btn.dataset.install;
    const done = () => {
      btn.classList.add("copied"); btn.innerHTML = ICON.check;
      btn.title = "copied  " + cmd;
      setTimeout(() => { btn.classList.remove("copied"); btn.innerHTML = ICON.install; }, 1400);
    };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(cmd).then(done, fallbackCopy.bind(null, cmd, done));
    } else { fallbackCopy(cmd, done); }
  }
  function fallbackCopy(text, done){
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); done(); }catch(e){}
    document.body.removeChild(ta);
  }
  function moveCarousel(car, s, dir){
    let i = (+car.dataset.i + dir + s.images.length) % s.images.length;
    car.dataset.i = i;
    $(".frame img", car).src = s.images[i];
    $(".count", car).textContent = `${i+1} / ${s.images.length}`;
    car.querySelectorAll(".dots i").forEach((d,di)=>d.classList.toggle("on", di===i));
  }

  /* ---------- filtering ----------
     Within a facet group: source/type are OR (a script has one source, may have
     several kinds); features/tags are AND (each narrows further). Across groups:
     AND. An empty source set means "all sources" (the clear-all resting state). */
  function matchSrc(s){ return !state.src.size || state.src.has(catOf(s)); }
  function matchQ(s){
    if(!state.q) return true;
    // status (when not active) joins the haystack so "archived"/"delisted"/
    // "unavailable" act as a lightweight archive view via search.
    const st = s.status && s.status!=="active" ? (s.status==="missing"?"unavailable missing":s.status) : "";
    const hay = (s.name+" "+(s.author||"")+" "+(s.desc||"")+" "+(s.tags||[]).join(" ")+" "+st).toLowerCase();
    return hay.includes(state.q);
  }
  function matchType(s){
    if(!state.type.size) return true;
    const kinds = s.kind||[];
    for(const t of state.type){ if(kinds.includes(t)) return true; }  // OR
    return false;
  }
  function matchFeat(s){
    for(const f of state.feat){ if(!(s.facets && s.facets[f])) return false; }  // AND
    return true;
  }
  function matchTags(s){
    if(!state.tags.size) return true;
    const st = new Set((s.tags||[]).map(t=>t.toLowerCase()));
    for(const t of state.tags){ if(!st.has(t)) return false; }  // AND
    return true;
  }
  function passes(s){
    if(state.only) return s.slug === state.only;  // single-script permalink view
    return matchSrc(s) && matchQ(s) && matchType(s) && matchFeat(s) && matchTags(s);
  }
  // Faceted counts: scripts passing every active filter EXCEPT the named group, so
  // each option's count reflects "how many you'd see if you toggled this on".
  function filteredExcept(except){
    return state.all.filter(s => {
      if(state.only) return false;
      if(except!=="src"  && !matchSrc(s))  return false;
      if(!matchQ(s)) return false;
      if(except!=="type" && !matchType(s)) return false;
      if(except!=="feat" && !matchFeat(s)) return false;
      if(except!=="tags" && !matchTags(s)) return false;
      return true;
    });
  }
  function sortFn(a,b){
    const [field, dir] = state.sort.split(":");
    const mul = dir==="asc" ? 1 : -1;
    switch(field){
      case "name":   return mul * a.name.localeCompare(b.name);
      case "author": return mul * (a.author||"~").localeCompare(b.author||"~") || a.name.localeCompare(b.name);
      case "stars":  return mul * ((a.stars||0)-(b.stars||0)) || (b.upd||"").localeCompare(a.upd||"");
      default:       return mul * (a.upd||"").localeCompare(b.upd||"") || a.name.localeCompare(b.name);
    }
  }

  /* ---------- filter dropdowns ---------- */
  const ddSet = (k) => k==="src" ? state.src : k==="type" ? state.type : k==="feat" ? state.feat : state.tags;
  function ddHTML(key, label, opts){
    const sel = ddSet(key);
    const items = opts.map(([v,l,c]) =>
      `<label class="dd-opt"><input type="checkbox" data-dd="${esc(key)}" value="${esc(v)}"${sel.has(v)?" checked":""}>${esc(l)}<span class="ct">${c}</span></label>`
    ).join("");
    return `<span class="dd" data-key="${esc(key)}">`
      + `<button class="dd-btn${sel.size?" on":""}" type="button">${esc(label)}</button>`
      + `<div class="dd-pop">${items}</div></span>`;
  }
  let openKey = null;
  function buildControls(){
    // source counts
    const srcN = {}; CATS.forEach(([k])=>srcN[k]=0);
    filteredExcept("src").forEach(s => { const c=catOf(s); if(c in srcN) srcN[c]++; });
    const srcOpts = CATS.map(([k,l]) => [k, l, srcN[k]]);
    // type counts
    const typeN = {}; TYPES.forEach(t=>typeN[t]=0);
    filteredExcept("type").forEach(s => (s.kind||[]).forEach(k => { if(k in typeN) typeN[k]++; }));
    const typeOpts = TYPES.map(t => [t, t, typeN[t]]);
    // feature counts
    const featN = {}; FEATS.forEach(([k])=>featN[k]=0);
    filteredExcept("feat").forEach(s => { for(const k in featN){ if(s.facets&&s.facets[k]) featN[k]++; } });
    const featOpts = FEATS.map(([k,l]) => [k, l, featN[k]]);
    // tag counts — all tags, sorted by frequency; popover scrolls (no truncation)
    const tagN = {};
    filteredExcept("tags").forEach(s => (s.tags||[]).forEach(t => { const k=t.toLowerCase(); tagN[k]=(tagN[k]||0)+1; }));
    state.tags.forEach(t => { if(!(t in tagN)) tagN[t]=0; });  // keep selected tags listed even at 0
    const tagOpts = Object.entries(tagN).sort((a,b)=> b[1]-a[1] || a[0].localeCompare(b[0])).map(([t,c]) => [t, t, c]);
    $("#ctrls").innerHTML = ddHTML("src","source",srcOpts) + ddHTML("type","type",typeOpts)
                          + ddHTML("feat","features",featOpts) + ddHTML("tags","tags",tagOpts);
    if(openKey){ const dd = $(`.dd[data-key="${openKey}"]`); if(dd) dd.classList.add("open"); }
  }

  /* ---------- render ---------- */
  const grid = $("#grid"), empty = $("#empty"), resmeta = $("#resmeta");
  function render(){
    const list = state.all.filter(passes).sort(sortFn);
    grid.innerHTML = "";
    if(!list.length){ grid.hidden=true; empty.hidden=false; }
    else{
      empty.hidden=true; grid.hidden=false;
      const frag = document.createDocumentFragment();
      const tmp = document.createElement("div");
      list.forEach(s => {
        tmp.innerHTML = cardHTML(s);
        const card = tmp.firstElementChild;
        wireCard(card, s);
        frag.appendChild(card);
      });
      grid.appendChild(frag);
    }
    buildControls();
    const nFilters = state.src.size + state.type.size + state.feat.size + state.tags.size + (state.q?1:0);
    resmeta.innerHTML = `<b>${list.length}</b> of ${state.all.length} scripts`
      + (nFilters ? ` · ${nFilters} filter${nFilters>1?'s':''} active` : "");
    renderActive();
    writeHash();
    if(state.only){
      // single-script permalink: it's the only card — open it, pin to top
      const s = state.all.find(x => x.slug === state.only);
      const card = grid.firstElementChild;
      if(card && s){
        expandAll(card, s);   // permalink view: eagerly load demo + shots + readme
        document.title = s.name + " · " + TITLE;
        window.scrollTo(0, 0);
      }
    }
  }

  /* ---------- shareable URL state ---------- */
  const TITLE = "nornslist · norns scripts";
  const SRC_LBL = Object.fromEntries(CATS), FEAT_LBL = Object.fromEntries(FEATS);
  const isDefaultSrc = () => state.src.size===1 && state.src.has("community");
  const isDefaultFeat = () => state.feat.size===1 && state.feat.has("installable");
  function writeHash(){
    const p = new URLSearchParams();
    if(state.only){
      p.set("s", state.only);  // keep the permalink shareable on refresh
    } else {
      if(state.q) p.set("q", state.q);
      // serialize src unless it's the default {community}; an explicit empty value
      // ("src=") round-trips the "all sources" state so it stays shareable.
      if(!isDefaultSrc()) p.set("src", [...state.src].join(","));
      if(state.type.size) p.set("type", [...state.type].join(","));
      if(!isDefaultFeat()) p.set("feat", [...state.feat].join(","));
      if(state.tags.size) p.set("tag", [...state.tags].join(","));
    }
    if(state.sort && state.sort !== "updated:desc") p.set("sort", state.sort);
    const h = p.toString();
    // replaceState (not location.hash=) so we don't spam history or fire hashchange
    history.replaceState(null, "", location.pathname + location.search + (h ? "#"+h : (location.hash ? "#" : "")));
    if(state.only){ return; }  // title set by render() for the single-script view
    const bits = [];
    if(state.q) bits.push("“"+state.q+"”");
    state.tags.forEach(t => bits.push(t));
    document.title = (bits.length ? bits.join(" · ") + " · " : "") + TITLE;
  }
  const setOf = (v) => new Set((v||"").split(",").filter(Boolean));
  function applyHash(){
    const p = new URLSearchParams(location.hash.replace(/^#/, ""));
    const s = p.get("s") || "";
    if(s){
      // deep-link to one script: show just it (clean permalink view)
      state.only = s; state.q = "";
      state.src = new Set(); state.type = new Set(); state.feat = new Set(); state.tags = new Set();
      state.sort = p.get("sort") || "updated:desc";
      return;
    }
    state.only = "";
    state.q = (p.get("q") || "").toLowerCase();
    // absent src → default {community}; present (even empty) → honor it (empty = all)
    state.src = p.has("src") ? setOf(p.get("src")) : new Set(["community"]);
    state.type = setOf(p.get("type"));
    // absent feat → default {installable}; present (even empty) → honor it (empty = installable off)
    state.feat = p.has("feat") ? setOf(p.get("feat")) : new Set(["installable"]);
    state.tags = new Set((p.get("tag") || "").split(",").filter(Boolean).map(x => x.toLowerCase()));
    state.sort = p.get("sort") || "updated:desc";
  }
  function syncInputs(){
    qi.value = state.q; sw.classList.toggle("has", !!state.q);
    $("#sort").value = state.sort;
  }

  function renderActive(){
    const box = $("#active");
    if(state.only){
      const s = state.all.find(x => x.slug === state.only);
      box.innerHTML = `<span class="ftag">◈ ${esc(s ? s.name : state.only)}<button data-clear-only aria-label="show all">×</button></span>`
        + `<button class="clearall" id="clearAll">show all scripts</button>`;
      return;
    }
    const chips = [];
    const chip = (g,v,l) => chips.push(`<span class="ftag">${esc(l)}<button data-rm="${esc(g)}:${esc(v)}" aria-label="remove">×</button></span>`);
    state.src.forEach(k => chip("src", k, SRC_LBL[k] || k));
    state.type.forEach(t => chip("type", t, t));
    state.feat.forEach(f => chip("feat", f, FEAT_LBL[f] || f));
    state.tags.forEach(t => chip("tags", t, t));
    box.innerHTML = chips.length ? chips.join("") + `<button class="clearall" id="clearAll">clear all</button>` : "";
  }

  // card pill clicks add/remove a tag filter
  function toggleTag(t){ state.only=""; t=t.toLowerCase(); state.tags.has(t)?state.tags.delete(t):state.tags.add(t); render(); }

  /* ---------- events ---------- */
  // dropdown open/close: clicking the button toggles its popover (closing others)
  $("#ctrls").addEventListener("click", e => {
    const btn = e.target.closest(".dd-btn"); if(!btn) return;
    const dd = btn.closest(".dd"), wasOpen = dd.classList.contains("open");
    document.querySelectorAll(".dd.open").forEach(d => d.classList.remove("open"));
    if(wasOpen){ openKey = null; } else { dd.classList.add("open"); openKey = dd.dataset.key; }
  });
  // checkbox toggles a filter; render() rebuilds the controls and re-opens this one
  $("#ctrls").addEventListener("change", e => {
    const cb = e.target.closest("input[data-dd]"); if(!cb) return;
    const set = ddSet(cb.dataset.dd);
    cb.checked ? set.add(cb.value) : set.delete(cb.value);
    state.only = ""; render();
  });
  // click outside any dropdown closes them
  document.addEventListener("click", e => {
    if(!e.target.closest(".dd")){ document.querySelectorAll(".dd.open").forEach(d => d.classList.remove("open")); openKey = null; }
  });
  $("#active").addEventListener("click", e => {
    if(e.target.id==="clearAll"){
      state.only=""; state.src=new Set(); state.type.clear(); state.feat.clear(); state.tags.clear(); render(); return;
    }
    if(e.target.dataset.clearOnly!==undefined){ state.only=""; render(); return; }
    const rm = e.target.dataset.rm;
    if(rm){ const i = rm.indexOf(":"); ddSet(rm.slice(0,i)).delete(rm.slice(i+1)); state.only=""; render(); }
  });
  const qi = $("#q"), sw = $("#searchWrap");
  let deb;
  qi.addEventListener("input", () => {
    sw.classList.toggle("has", qi.value.length>0);
    clearTimeout(deb); deb=setTimeout(()=>{ state.only=""; state.q=qi.value.trim().toLowerCase(); render(); }, 120);
  });
  $("#clrSearch").addEventListener("click", () => { qi.value=""; sw.classList.remove("has"); state.q=""; render(); qi.focus(); });
  $("#sort").addEventListener("change", e => { state.sort=e.target.value; render(); });
  // back/forward or an externally-pasted #hash re-applies filter state
  window.addEventListener("hashchange", () => { applyHash(); syncInputs(); render(); });

  /* ---------- boot ---------- */
  fetch("data.json", {cache:"no-store"})
    .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(d => {
      state.all = d.scripts || [];
      const dt = d.generated || "";
      const commCount = state.all.filter(s => catOf(s)==="community").length;
      $("#genmeta").innerHTML = `<b>${commCount}</b> scripts${dt?` · updated ${esc(dt)}`:""}`;
      $("#loading").remove();
      applyHash();
      syncInputs();
      render();
    })
    .catch(err => {
      $("#loading").innerHTML = `<div class="empty"><h3>couldn't load the catalog</h3><p>data.json failed to load (${esc(String(err))}). If you're viewing this locally, serve the folder over http (e.g. <code>python3 -m http.server</code>) rather than opening the file directly.</p></div>`;
    });
})();
</script>
</body>
</html>
